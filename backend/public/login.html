<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — MessMitra</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="manifest" href="/manifest.json">
  <style>
    body {
      background: var(--color-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 16px;
    }

    .login-wrap {
      width: 100%;
      max-width: 420px;
    }

    .login-logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .login-logo-mark {
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--color-primary);
      letter-spacing: -0.5px;
    }

    .login-logo-sub {
      font-size: 0.875rem;
      color: var(--color-text-secondary);
      margin-top: 4px;
    }

    .login-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-xl);
      padding: 32px;
    }

    .login-title {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--color-text-primary);
      margin-bottom: 4px;
    }

    .login-sub {
      font-size: 0.875rem;
      color: var(--color-text-secondary);
      margin-bottom: 24px;
    }

    .login-footer {
      text-align: center;
      margin-top: 20px;
      font-size: 0.875rem;
      color: var(--color-text-secondary);
    }

    .login-footer a {
      color: var(--color-primary);
      font-weight: 600;
    }

    .error-banner {
      background: var(--color-danger-light);
      border: 1px solid #FECACA;
      border-radius: var(--radius-md);
      padding: 10px 14px;
      font-size: 0.875rem;
      color: var(--color-danger-text);
      margin-bottom: 16px;
      display: none;
    }

    .password-wrap {
      position: relative;
    }

    .password-toggle {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--color-text-muted);
      padding: 4px;
    }
  </style>
</head>

<body>
  <div class="login-wrap">


    <div class="login-logo">
      <div class="login-logo-mark">MessMitra</div>
      <div class="login-logo-sub">Smart mess management</div>
    </div>
    <div class="login-card">
      <div class="login-title">Welcome back</div>
      <div class="login-sub">Sign in to your account</div>
      <div class="error-banner" id="error-banner"></div>
      <div class="form-group">
        <label class="form-label">Email address <span>*</span></label>
        <input class="form-input" type="email" id="email" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label">Password <span>*</span></label>
        <div class="password-wrap">
          <input class="form-input" type="password" id="password" placeholder="Enter your password"
            autocomplete="current-password">
          <button class="password-toggle" type="button" onclick="togglePassword()">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5"
              stroke-linecap="round">
              <path d="M1 9s3-6 8-6 8 6 8 6-3 6-8 6-8-6-8-6z" />
              <circle cx="9" cy="9" r="2.5" />
            </svg>
          </button>
        </div>
      </div>
      <button class="btn btn-primary btn-full" id="login-btn" onclick="handleLogin()">Sign in</button>
    </div>
    <div class="login-footer">
      Don't have an account? <a href="/register.html">Create one</a>
    </div>
  </div>
  <script src="/js/auth.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/utils.js"></script>
  <script>
    auth.redirectIfLoggedIn()

    function togglePassword() {
      const input = document.getElementById('password')
      input.type = input.type === 'password' ? 'text' : 'password'
    }

    async function handleLogin() {
      const email = document.getElementById('email').value.trim()
      const password = document.getElementById('password').value
      const btn = document.getElementById('login-btn')
      const banner = document.getElementById('error-banner')

      banner.style.display = 'none'

      if (!email || !password) {
        banner.textContent = 'Please enter your email and password'
        banner.style.display = 'block'
        return
      }

      btn.textContent = 'Signing in...'
      btn.disabled = true

      try {
        const result = await api.auth.login({ email, password })
        auth.save(result.token, result.user)
        auth.redirectToDashboard()
      } catch (err) {
        banner.textContent = err.message || 'Login failed. Please try again.'
        banner.style.display = 'block'
        btn.textContent = 'Sign in'
        btn.disabled = false
      }
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') handleLogin()
    })
  </script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mess Detail — MessMitra</title>
    <link rel="stylesheet" href="css/main.css" />
    <link rel="stylesheet" href="css/components.css" />
    <link rel="manifest" href="manifest.json" />
    <style>
      .detail-wrap {
        max-width: 900px;
        margin: 0 auto;
        padding: 24px;
      }
      .detail-hero {
        background: var(--color-surface);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-xl);
        overflow: hidden;
        margin-bottom: 20px;
      }
      .detail-cover {
        height: 220px;
        background: var(--color-bg);
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }
      .detail-cover img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .detail-cover-placeholder {
        font-size: 4rem;
        color: var(--color-text-muted);
      }
      .detail-info {
        padding: 20px 24px;
      }
      .detail-top {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 8px;
      }
      .detail-name {
        font-size: 1.375rem;
        font-weight: 700;
      }
      .detail-rating {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 2px;
      }
      .detail-rating-n {
        font-size: 1.5rem;
        font-weight: 700;
        font-family: var(--font-mono);
        color: var(--color-warning);
      }
      .detail-rating-count {
        font-size: 0.75rem;
        color: var(--color-text-muted);
      }
      .detail-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 12px;
        font-size: 0.875rem;
        color: var(--color-text-secondary);
      }
      .detail-meta-item {
        display: flex;
        align-items: center;
        gap: 5px;
      }
      .plans-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
        gap: 12px;
        margin-bottom: 20px;
      }
      .plan-card {
        background: var(--color-surface);
        border: 1.5px solid var(--color-border);
        border-radius: var(--radius-lg);
        padding: 16px;
        cursor: pointer;
        transition: var(--transition);
      }
      .plan-card:hover {
        border-color: var(--color-primary);
      }
      .plan-card.selected {
        border-color: var(--color-primary);
        background: var(--color-primary-light);
      }
      .plan-name {
        font-size: 0.9375rem;
        font-weight: 700;
        margin-bottom: 6px;
      }
      .plan-price {
        font-size: 1.375rem;
        font-weight: 700;
        font-family: var(--font-mono);
        color: var(--color-primary);
        margin-bottom: 8px;
      }
      .plan-price span {
        font-size: 0.75rem;
        font-weight: 400;
        color: var(--color-text-muted);
        font-family: var(--font-display);
      }
      .plan-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 5px;
        margin-bottom: 8px;
      }
      .plan-slots {
        font-size: 0.75rem;
        color: var(--color-text-muted);
      }
      .menu-tabs {
        display: flex;
        gap: 6px;
        margin-bottom: 14px;
      }
      .menu-tab {
        padding: 6px 14px;
        border-radius: var(--radius-full);
        font-size: 0.8125rem;
        font-weight: 500;
        border: 1.5px solid var(--color-border);
        background: var(--color-surface);
        color: var(--color-text-secondary);
        cursor: pointer;
        transition: var(--transition);
      }
      .menu-tab.active {
        background: var(--color-primary);
        color: #fff;
        border-color: var(--color-primary);
      }
      .menu-list {
        display: flex;
        flex-direction: column;
        gap: 0;
      }
      .menu-row {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 0;
        border-bottom: 1px solid var(--color-border);
      }
      .menu-row:last-child {
        border: none;
      }
      .menu-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        flex-shrink: 0;
      }
      .review-list {
        display: flex;
        flex-direction: column;
        gap: 0;
      }
      .review-item {
        display: flex;
        gap: 12px;
        padding: 14px 0;
        border-bottom: 1px solid var(--color-border);
      }
      .review-item:last-child {
        border: none;
      }
      .review-body {
        flex: 1;
      }
      .review-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 4px;
      }
      .review-name {
        font-size: 0.875rem;
        font-weight: 600;
      }
      .review-stars {
        font-size: 0.875rem;
        color: var(--color-warning);
        font-family: var(--font-mono);
      }
      .review-text {
        font-size: 0.875rem;
        color: var(--color-text-secondary);
      }
      .sticky-cta {
        position: sticky;
        bottom: 16px;
        margin-top: 24px;
      }
      @media (max-width: 640px) {
        .detail-wrap {
          padding: 12px;
        }
        .detail-cover {
          height: 160px;
        }
      }
    </style>
  </head>
  <body>
    <nav class="public-nav">
      <a
        href="/index.html"
        style="
          display: flex;
          align-items: center;
          gap: 6px;
          color: var(--color-text-secondary);
          font-size: 0.875rem;
        "
      >
        <svg
          width="16"
          height="16"
          viewBox="0 0 16 16"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
        >
          <path d="M10 13L5 8l5-5" />
        </svg>
        Back
      </a>
      <div class="public-nav-logo">MessMitra</div>
      <div class="public-nav-links" style="display: flex; gap: 8px">
        <a href="/login.html" class="btn btn-secondary btn-sm">Sign in</a>
      </div>
    </nav>

    <div class="detail-wrap">
      <div id="mess-content">
        <div
          class="skeleton"
          style="height: 400px; border-radius: var(--radius-xl)"
        ></div>
      </div>
    </div>

    <script src="/js/auth.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/utils.js"></script>
    <script>
      auth.showDashboardLink()
      const params = new URLSearchParams(window.location.search);
      const messId = params.get("id");
      let selectedPlanId = null;
      let activeMenuTab = "LUNCH";

      const catLabel = {
        PURE_VEG: "Pure veg",
        NONVEG: "Non-veg",
        BOTH: "Veg & Non-veg",
      };
      const catBadge = {
        PURE_VEG: "b-success",
        NONVEG: "b-danger",
        BOTH: "b-warning",
      };
      const foodColor = {
        VEG: "#2D6A4F",
        NONVEG: "#B91C1C",
        EGG: "#A16207",
        VEGAN: "#2D6A4F",
      };
      const foodBadge = {
        VEG: "b-veg",
        NONVEG: "b-nonveg",
        EGG: "b-egg",
        VEGAN: "b-veg",
      };

      function renderStars(n) {
        return "★".repeat(Math.round(n)) + "☆".repeat(5 - Math.round(n));
      }

      function selectPlan(id) {
        selectedPlanId = id;
        document
          .querySelectorAll(".plan-card")
          .forEach((c) => c.classList.toggle("selected", c.dataset.id === id));
      }

      function handleSubscribe() {
        if (!auth.isLoggedIn()) {
          window.location.href = `/login.html`;
          return;
        }
        if (auth.getRole() !== "STUDENT") {
          utils.toast("Only students can subscribe to a mess", "error");
          return;
        }
        if (!selectedPlanId) {
          utils.toast("Please select a plan first", "error");
          return;
        }
        window.location.href = `/student/subscription.html?plan=${selectedPlanId}&mess=${messId}`;
      }

      function setMenuTab(tab) {
        activeMenuTab = tab;
        document
          .querySelectorAll(".menu-tab")
          .forEach((t) => t.classList.toggle("active", t.dataset.tab === tab));
        renderMenuItems();
      }

      let menuData = {};
      function renderMenuItems() {
        const items = menuData[activeMenuTab] || [];
        const list = document.getElementById("menu-items");
        if (!list) return;
        list.innerHTML =
          items.length === 0
            ? `<div style="padding:16px;text-align:center;color:var(--color-text-muted);font-size:0.875rem;">No menu published for ${activeMenuTab.toLowerCase()} today</div>`
            : items
                .map(
                  (item) => `
          <div class="menu-row">
            <div class="menu-dot" style="background:${
              foodColor[item.foodCategory] || "#888"
            };"></div>
            <span style="flex:1;font-size:0.9375rem;font-weight:500;">${
              item.itemName
            }</span>
            <span class="badge ${
              foodBadge[item.foodCategory] || "b-neutral"
            }">${item.foodCategory}</span>
          </div>`
                )
                .join("");
      }

      async function loadMess() {
        if (!messId) {
          window.location.href = "/index.html";
          return;
        }
        try {
          const [mess, menu] = await Promise.all([
            api.mess.get(messId),
            api.menu
              .byMess(messId)
              .catch(() => ({ BREAKFAST: [], LUNCH: [], DINNER: [] })),
          ]);
          menuData = menu;

          document.getElementById("mess-content").innerHTML = `
        <div class="detail-hero">
          <div class="detail-cover">
            ${
              mess.coverPhoto
                ? `<img src="${mess.coverPhoto}" alt="${mess.name}">`
                : `<div class="detail-cover-placeholder">🍱</div>`
            }
          </div>
          <div class="detail-info">
            <div class="detail-top">
              <div>
                <div class="detail-name">${mess.name}</div>
                ${
                  mess.description
                    ? `<p style="margin-top:4px;">${mess.description}</p>`
                    : ""
                }
              </div>
              <div class="detail-rating">
                <div class="detail-rating-n">${
                  mess.avgRating > 0 ? mess.avgRating.toFixed(1) : "—"
                }</div>
                <div class="detail-rating-count">${mess.totalReviews} review${
            mess.totalReviews !== 1 ? "s" : ""
          }</div>
              </div>
            </div>
            <div class="detail-meta">
              <div class="detail-meta-item">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M7 1C4.8 1 3 2.8 3 5c0 3 4 8 4 8s4-5 4-8c0-2.2-1.8-4-4-4z"/><circle cx="7" cy="5" r="1.5"/></svg>
                ${mess.address}
              </div>
              <div class="detail-meta-item">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M2 2h3l1.5 3.5-1.5 1a8 8 0 004 4l1-1.5L13 10.5V13A11 11 0 012 2z"/></svg>
                ${mess.phone}
              </div>
              <div class="detail-meta-item">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="7" cy="7" r="5"/><path d="M7 4v3l2 2"/></svg>
                ${mess.openingTime} — ${mess.closingTime}
              </div>
              <span class="badge ${catBadge[mess.category] || "b-neutral"}">${
            catLabel[mess.category] || mess.category
          }</span>
            </div>
          </div>
        </div>

        <div class="card" style="margin-bottom:16px;">
          <div class="card-header"><span class="card-title">Choose a plan</span></div>
          <div class="plans-grid">
            ${
              mess.plans.length === 0
                ? `<div style="color:var(--color-text-muted);font-size:0.875rem;">No plans available yet</div>`
                : mess.plans
                    .map(
                      (p) => `
                <div class="plan-card" data-id="${p.id}" onclick="selectPlan('${
                        p.id
                      }')">
                  <div class="plan-name">${p.name}</div>
                  <div class="plan-price">₹${Number(p.price).toLocaleString(
                    "en-IN"
                  )} <span>/ ${p.duration.toLowerCase()}</span></div>
                  <div class="plan-tags">
                    ${p.mealTypes
                      .map(
                        (m) =>
                          `<span class="badge b-neutral">${
                            m.charAt(0) + m.slice(1).toLowerCase()
                          }</span>`
                      )
                      .join("")}
                    <span class="badge ${
                      foodBadge[p.foodCategory] || "b-neutral"
                    }">${p.foodCategory}</span>
                  </div>
                  <div class="plan-slots">${
                    p.maxSlots - p.currentSlots
                  } slots available</div>
                </div>`
                    )
                    .join("")
            }
          </div>
          <button class="btn btn-primary btn-full" onclick="handleSubscribe()">Subscribe to this mess</button>
        </div>

        <div class="card" style="margin-bottom:16px;">
          <div class="card-header"><span class="card-title">Today's menu</span></div>
          <div class="menu-tabs">
            <button class="menu-tab ${
              activeMenuTab === "BREAKFAST" ? "active" : ""
            }" data-tab="BREAKFAST" onclick="setMenuTab('BREAKFAST')">Breakfast</button>
            <button class="menu-tab ${
              activeMenuTab === "LUNCH" ? "active" : ""
            }" data-tab="LUNCH" onclick="setMenuTab('LUNCH')">Lunch</button>
            <button class="menu-tab ${
              activeMenuTab === "DINNER" ? "active" : ""
            }" data-tab="DINNER" onclick="setMenuTab('DINNER')">Dinner</button>
          </div>
          <div class="menu-list" id="menu-items"></div>
        </div>

        <div class="card">
          <div class="card-header">
            <span class="card-title">Reviews</span>
            <span style="font-size:0.8125rem;color:var(--color-text-muted);">${
              mess.totalReviews
            } total</span>
          </div>
          <div class="review-list">
            ${
              !mess.reviews || mess.reviews.length === 0
                ? `<div style="padding:16px;text-align:center;color:var(--color-text-muted);font-size:0.875rem;">No reviews yet — be the first!</div>`
                : mess.reviews
                    .map(
                      (r) => `
                <div class="review-item">
                  <div class="avatar avatar-sm">${utils.initials(
                    r.user.name
                  )}</div>
                  <div class="review-body">
                    <div class="review-header">
                      <span class="review-name">${r.user.name}</span>
                      <span class="review-stars">${renderStars(r.rating)}</span>
                    </div>
                    ${
                      r.comment
                        ? `<div class="review-text">${r.comment}</div>`
                        : ""
                    }
                  </div>
                </div>`
                    )
                    .join("")
            }
          </div>
        </div>`;

          renderMenuItems();
          document.title = `${mess.name} — MessMitra`;
        } catch (err) {
          document.getElementById("mess-content").innerHTML = `
        <div class="empty-state">
          <h3>Mess not found</h3>
          <p>${err.message}</p>
          <a href="/index.html" class="btn btn-primary" style="margin-top:12px;">Back to catalog</a>
        </div>`;
        }
      }

      loadMess();
    </script>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reviews — MessMitra</title>
<link rel="stylesheet" href="/css/main.css">
<link rel="stylesheet" href="/css/components.css">
<link rel="manifest" href="/manifest.json">
</head>
<body class="page-owner">
<script>
  const _t = localStorage.getItem('mm_token');
  const _u = (() => { try { return JSON.parse(localStorage.getItem('mm_user')); } catch { return null; } })();
  if (!_t || !_u) { window.location.replace('/login.html'); }
</script>
<div class="app-shell">
  <aside class="sidebar">
    <div class="sidebar-logo"><div class="sidebar-logo-mark">MessMitra</div><div class="sidebar-logo-sub">owner portal</div></div>
    <nav class="sidebar-nav">
      <a href="/owner/dashboard.html" class="sidebar-item"><div class="sidebar-item-dot"></div>Dashboard</a>
      <a href="/owner/demand.html" class="sidebar-item"><div class="sidebar-item-dot"></div>Demand & attendance</a>
      <a href="/owner/menu-manage.html" class="sidebar-item"><div class="sidebar-item-dot"></div>Menu</a>
      <a href="/owner/plans.html" class="sidebar-item"><div class="sidebar-item-dot"></div>Plans</a>
      <a href="/owner/subscribers.html" class="sidebar-item"><div class="sidebar-item-dot"></div>Subscribers</a>
      <a href="/owner/delivery-manage.html" class="sidebar-item"><div class="sidebar-item-dot"></div>Deliveries</a>
      <a href="/owner/holidays.html" class="sidebar-item"><div class="sidebar-item-dot"></div>Holidays</a>
      <a href="/owner/reviews.html" class="sidebar-item active"><div class="sidebar-item-dot"></div>Reviews</a>
      <a href="/owner/mess-setup.html" class="sidebar-item"><div class="sidebar-item-dot"></div>Mess setup</a>
      <a href="/owner/profile.html" class="sidebar-item"><div class="sidebar-item-dot"></div>Profile</a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="avatar avatar-sm" data-user-initials>?</div>
        <div><div class="sidebar-user-name" data-user-name></div><div class="sidebar-user-role">Owner</div></div>
      </div>
    </div>
  </aside>
  <div class="main-content">
    <header class="topbar">
      <div style="flex:1;font-size:1rem;font-weight:700;">Reviews & ratings</div>
    </header>
    <main class="page-content">
      <div id="page-body"><div class="skeleton" style="height:300px;"></div></div>
    </main>
  </div>
</div>
<script src="/js/auth.js"></script>
<script src="/js/api.js"></script>
<script src="/js/utils.js"></script>
<script>
if(!auth.requireAuth(['OWNER'])){}
utils.fillUserInfo()
utils.registerSW()

async function loadReviews(){
  try{
    const data=await api.reviews.owner()
    const s=data.summary||{}
    const avg=s._avg||{}
    let html=`
      <div class="stat-grid" style="margin-bottom:16px;">
        <div class="stat-card fade-up"><div class="stat-label">Overall rating</div><div class="stat-value" style="color:var(--color-warning);">${avg.rating?Number(avg.rating).toFixed(1):'—'}</div></div>
        <div class="stat-card fade-up delay-1"><div class="stat-label">Food rating</div><div class="stat-value" style="color:var(--color-primary);">${avg.foodRating?Number(avg.foodRating).toFixed(1):'—'}</div></div>
        <div class="stat-card fade-up delay-2"><div class="stat-label">Delivery rating</div><div class="stat-value" style="color:var(--color-cyan);">${avg.deliveryRating?Number(avg.deliveryRating).toFixed(1):'—'}</div></div>
        <div class="stat-card fade-up delay-3"><div class="stat-label">Total reviews</div><div class="stat-value" id="rev-count">0</div></div>
      </div>
      <div class="card fade-up delay-2">
        <div class="card-header"><span class="card-title">All reviews</span></div>
        ${!data.reviews||data.reviews.length===0
          ?`<div class="empty-state" style="padding:20px 0;"><div class="empty-state-icon">⭐</div><h3>No reviews yet</h3><p>Reviews will appear here after students rate their meals.</p></div>`
          :data.reviews.map(r=>`
            <div class="list-item">
              <div class="avatar avatar-sm">${utils.initials(r.user.name)}</div>
              <div style="flex:1;">
                <div style="display:flex;align-items:center;justify-content:space-between;">
                  <span style="font-size:.875rem;font-weight:600;">${r.user.name}</span>
                  <span style="color:var(--color-warning);font-family:var(--font-mono);font-size:.875rem;">${'★'.repeat(r.rating)}${'☆'.repeat(5-r.rating)}</span>
                </div>
                ${r.comment?`<div style="font-size:.8125rem;color:var(--color-text-secondary);margin-top:3px;">${r.comment}</div>`:''}
                <div style="font-size:.6875rem;color:var(--color-text-muted);margin-top:3px;font-family:var(--font-mono);">${utils.formatDate(r.createdAt)}</div>
              </div>
            </div>`).join('')}
      </div>`
    document.getElementById('page-body').innerHTML=html
    if(data.reviews)setTimeout(()=>utils.countUp(document.getElementById('rev-count'),data.reviews.length),200)
  }catch(err){document.getElementById('page-body').innerHTML=`<div class="empty-state"><h3>Error</h3><p>${err.message}</p></div>`}
}
loadReviews()
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register — MessMitra</title>
<link rel="stylesheet" href="css/main.css">
<link rel="stylesheet" href="css/components.css">
<link rel="manifest" href="/manifest.json">
<style>
  body { background: var(--color-bg); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 16px; }
  .reg-wrap { width: 100%; max-width: 460px; }
  .reg-logo { text-align: center; margin-bottom: 24px; }
  .reg-logo-mark { font-size: 1.75rem; font-weight: 700; color: var(--color-primary); }
  .reg-logo-sub { font-size: 0.875rem; color: var(--color-text-secondary); margin-top: 4px; }
  .reg-card { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-xl); padding: 32px; }
  .reg-title { font-size: 1.25rem; font-weight: 700; margin-bottom: 4px; }
  .reg-sub { font-size: 0.875rem; color: var(--color-text-secondary); margin-bottom: 24px; }
  .role-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 4px; }
  .role-card { border: 1.5px solid var(--color-border); border-radius: var(--radius-md); padding: 12px 8px; text-align: center; cursor: pointer; transition: var(--transition); }
  .role-card:hover { border-color: var(--color-primary); background: var(--color-primary-light); }
  .role-card.selected { border-color: var(--color-primary); background: var(--color-primary-light); }
  .role-card-icon { font-size: 1.25rem; margin-bottom: 4px; }
  .role-card-name { font-size: 0.75rem; font-weight: 600; color: var(--color-text-primary); }
  .role-card-desc { font-size: 0.625rem; color: var(--color-text-muted); margin-top: 2px; }
  .error-banner { background: var(--color-danger-light); border: 1px solid #FECACA; border-radius: var(--radius-md); padding: 10px 14px; font-size: 0.875rem; color: var(--color-danger-text); margin-bottom: 16px; display: none; }
  .reg-footer { text-align: center; margin-top: 20px; font-size: 0.875rem; color: var(--color-text-secondary); }
  .reg-footer a { color: var(--color-primary); font-weight: 600; }
  .password-wrap { position: relative; }
  .password-toggle { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--color-text-muted); }
  .strength-bar { height: 4px; border-radius: 99px; background: var(--color-border); margin-top: 6px; overflow: hidden; }
  .strength-fill { height: 100%; border-radius: 99px; transition: all 0.3s; }
</style>
</head>
<body>
<div class="reg-wrap">
  <div class="reg-logo">
    <div class="reg-logo-mark">MessMitra</div>
    <div class="reg-logo-sub">Smart mess management</div>
  </div>
  <div class="reg-card">
    <div class="reg-title">Create account</div>
    <div class="reg-sub">Join MessMitra today</div>
    <div class="error-banner" id="error-banner"></div>

    <div class="form-group">
      <label class="form-label">I am a <span>*</span></label>
      <div class="role-grid">
        <div class="role-card" onclick="selectRole('STUDENT')" id="role-STUDENT">
          <div class="role-card-icon">🎓</div>
          <div class="role-card-name">Student</div>
          <div class="role-card-desc">Subscribe to mess</div>
        </div>
        <div class="role-card" onclick="selectRole('OWNER')" id="role-OWNER">
          <div class="role-card-icon">🍱</div>
          <div class="role-card-name">Mess owner</div>
          <div class="role-card-desc">Manage my mess</div>
        </div>
        <div class="role-card" onclick="selectRole('DELIVERY')" id="role-DELIVERY">
          <div class="role-card-icon">🛵</div>
          <div class="role-card-name">Delivery</div>
          <div class="role-card-desc">Deliver meals</div>
        </div>
      </div>
      <input type="hidden" id="role" value="">
    </div>

    <div class="form-group">
      <label class="form-label">Full name <span>*</span></label>
      <input class="form-input" type="text" id="name" placeholder="Your full name" autocomplete="name">
    </div>
    <div class="form-group">
      <label class="form-label">Email address <span>*</span></label>
      <input class="form-input" type="email" id="email" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label class="form-label">Mobile number <span>*</span></label>
      <input class="form-input" type="tel" id="phone" placeholder="10-digit mobile number" maxlength="10" autocomplete="tel">
    </div>
    <div class="form-group">
      <label class="form-label">Password <span>*</span></label>
      <div class="password-wrap">
        <input class="form-input" type="password" id="password" placeholder="At least 6 characters" oninput="checkStrength(this.value)">
        <button class="password-toggle" type="button" onclick="togglePassword()">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M1 9s3-6 8-6 8 6 8 6-3 6-8 6-8-6-8-6z"/><circle cx="9" cy="9" r="2.5"/></svg>
        </button>
      </div>
      <div class="strength-bar"><div class="strength-fill" id="strength-fill" style="width:0%;background:#E7E5E4;"></div></div>
    </div>

    <button class="btn btn-primary btn-full" id="reg-btn" onclick="handleRegister()">Create account</button>
  </div>
  <div class="reg-footer">Already have an account? <a href="/login.html">Sign in</a></div>
</div>
<script src="/js/auth.js"></script>
<script src="/js/api.js"></script>
<script src="/js/utils.js"></script>
<script>
  auth.redirectIfLoggedIn()
  let selectedRole = ''

  function selectRole(role) {
    selectedRole = role
    document.querySelectorAll('.role-card').forEach(c => c.classList.remove('selected'))
    document.getElementById('role-' + role).classList.add('selected')
    document.getElementById('role').value = role
  }

  function togglePassword() {
    const input = document.getElementById('password')
    input.type = input.type === 'password' ? 'text' : 'password'
  }

  function checkStrength(val) {
    const fill = document.getElementById('strength-fill')
    if (val.length === 0) { fill.style.width = '0%'; return }
    let score = 0
    if (val.length >= 6)  score++
    if (val.length >= 10) score++
    if (/[A-Z]/.test(val)) score++
    if (/[0-9]/.test(val)) score++
    const colors = ['#B91C1C', '#A16207', '#2D6A4F', '#15803D']
    const widths  = ['25%', '50%', '75%', '100%']
    fill.style.width = widths[score - 1] || '10%'
    fill.style.background = colors[score - 1] || '#E7E5E4'
  }

  async function handleRegister() {
    const name = document.getElementById('name').value.trim()
    const email = document.getElementById('email').value.trim()
    const phone = document.getElementById('phone').value.trim()
    const password = document.getElementById('password').value
    const role = selectedRole
    const btn = document.getElementById('reg-btn')
    const banner = document.getElementById('error-banner')

    banner.style.display = 'none'

    if (!role)     { banner.textContent = 'Please select your role'; banner.style.display = 'block'; return }
    if (!name)     { banner.textContent = 'Please enter your name'; banner.style.display = 'block'; return }
    if (!email)    { banner.textContent = 'Please enter your email'; banner.style.display = 'block'; return }
    if (!phone || phone.length !== 10) { banner.textContent = 'Please enter a valid 10-digit mobile number'; banner.style.display = 'block'; return }
    if (password.length < 6) { banner.textContent = 'Password must be at least 6 characters'; banner.style.display = 'block'; return }

    btn.textContent = 'Creating account...'
    btn.disabled = true

    try {
      const result = await api.auth.register({ name, email, phone, password, role })
      auth.save(result.token, result.user)
      auth.redirectToDashboard()
    } catch (err) {
      banner.textContent = err.message || 'Registration failed. Please try again.'
      banner.style.display = 'block'
      btn.textContent = 'Create account'
      btn.disabled = false
    }
  }
</script>
</body>
</html>

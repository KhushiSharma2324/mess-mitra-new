  <script src="/js/auth.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/utils.js"></script>
  <script>
    if (!auth.requireAuth(['STUDENT'])) { }
    utils.fillUserInfo()
    utils.registerSW()

    const statusSteps = ['PENDING', 'ASSIGNED', 'PICKED_UP', 'DELIVERED']
    const stepLabels = { PENDING: 'Order created', ASSIGNED: 'Partner assigned', PICKED_UP: 'Meal picked up', DELIVERED: 'Delivered!' }
    const stepSubs = { PENDING: 'Waiting for delivery assignment', ASSIGNED: 'Partner is on the way to mess', PICKED_UP: 'Your meal is on its way', DELIVERED: 'Enjoy your meal!' }

    function renderTimeline(order) {
      const curIdx = statusSteps.indexOf(order.status)
      return statusSteps.map((step, i) => {
        const done = i < curIdx || order.status === 'DELIVERED'
        const active = i === curIdx && order.status !== 'DELIVERED'
        return `
        <div class="timeline-item ${done ? 'done' : ''} ${active ? 'active' : ''}">
          <div class="timeline-dot">${done ? '✓' : i + 1}</div>
          <div class="timeline-body">
            <div class="timeline-title">${stepLabels[step]}</div>
            <div class="timeline-sub">${active ? stepSubs[step] : (done ? 'Completed' : 'Waiting')}</div>
          </div>
        </div>`
      }).join('')
    }

    async function loadPage() {
      try {
        const sub = await api.subscriptions.me().catch(() => null)
        if (!sub) {
          document.getElementById('page-body').innerHTML = `<div class="empty-state fade-up"><div class="empty-state-icon">📦</div><h3>No subscription</h3><p>Subscribe to a mess to track deliveries.</p><a href="/index.html" class="btn btn-primary" style="margin-top:12px;">Find a mess</a></div>`
          return
        }

        const attLogs = await api.attendance.today().catch(() => [])
        if (attLogs.length === 0) {
          document.getElementById('page-body').innerHTML = `<div class="empty-state fade-up"><div class="empty-state-icon">⏰</div><h3>No attendance today</h3><p>Mark attendance first to get delivery.</p><a href="/student/attendance.html" class="btn btn-primary" style="margin-top:12px;">Mark now</a></div>`
          return
        }

        let html = ''
        for (const log of attLogs) {
          const mealLabel = log.mealType.charAt(0) + log.mealType.slice(1).toLowerCase()
          if (!log.deliveryOrder) {
            html += `
            <div class="delivery-card fade-up">
              <div class="delivery-meal">${mealLabel}</div>
              <div class="delivery-date">${utils.formatDate(log.date)}</div>
              <div class="empty-state" style="padding:16px 0;"><h3 style="font-size:0.9375rem;">Order not generated yet</h3><p>Owner will generate delivery orders soon.</p></div>
            </div>`
          } else {
            const order = log.deliveryOrder
            html += `
            <div class="delivery-card fade-up">
              <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;">
                <div class="delivery-meal">${mealLabel}</div>
                ${utils.statusBadge(order.status)}
              </div>
              <div class="delivery-date">${utils.formatDate(log.date)}</div>
              <div class="timeline">${renderTimeline(order)}</div>
              ${order.partner ? `
                <div style="margin-top:14px;padding:10px 12px;background:var(--color-bg);border-radius:var(--radius-md);display:flex;align-items:center;gap:10px;">
                  <div class="avatar avatar-sm">${utils.initials(order.partner.name)}</div>
                  <div><div style="font-size:0.875rem;font-weight:600;">${order.partner.name}</div><div style="font-size:0.75rem;color:var(--color-text-muted);">Delivery partner</div></div>
                  <a href="tel:${order.partner.phone}" class="btn btn-secondary btn-sm" style="margin-left:auto;">Call</a>
                </div>` : ''}
              ${order.status === 'DELIVERED' ? `
                <a href="/student/review.html?orderId=${order.id}" class="btn btn-primary btn-full" style="margin-top:12px;">Leave a review</a>` : ''}
            </div>`
          }
        }

        document.getElementById('page-body').innerHTML = html || `<div class="empty-state"><h3>No deliveries</h3></div>`
      } catch (err) {
        document.getElementById('page-body').innerHTML = `<div class="empty-state"><h3>Error</h3><p>${err.message}</p></div>`
      }
    }

    loadPage()
  </script>
</body>
